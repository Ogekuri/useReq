{
  "master": "master",
  "develop": "develop",
  "work": "work",
  "default_commit_module": "",
  "ver_rules": [
    {
      "pattern": "README.md",
      "regex": "\\s*\\((\\d+\\.\\d+\\.\\d+)\\)\\n"
    },
    {
      "pattern": "scripts/**/*.sh",
      "regex": "VERSION:\\s*(\\d+\\.\\d+\\.\\d+)\\n"
    },
    {
      "pattern": "src/**/*.py",
      "regex": "__version__\\s*=\\s*[\"\\']?(\\d+\\.\\d+\\.\\d+)[\"\\']?"
    },
    {
      "pattern": "pyproject.toml",
      "regex": "\\bversion\\s*=\\s*\"(\\d+\\.\\d+\\.\\d+)\""
    },
    {
      "pattern": "uv.lock",
      "regex": "\\[\\[package\\]\\]\\s*name\\s*=\\s*\"usereq\"\\s*version\\s*=\\s*\"(\\d+\\.\\d+\\.\\d+)\""
    }
  ]
}
